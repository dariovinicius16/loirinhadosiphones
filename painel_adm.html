<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Jhon dos iPhones</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between">










<header class="border-b border-gray-900 bg-gray-950/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black tracking-wider text-white">
                JHON DOS <span class="text-amber-500">iPHONES</span>
            </h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-semibold">Painel Administrativo</p>
        </div>
        
        <button onclick="logout()" class="bg-red-950/40 hover:bg-red-600 text-red-400 hover:text-white border border-red-900/60 text-xs font-bold px-4 py-2 rounded-xl transition flex items-center gap-2 cursor-pointer">
            <i class="fa-solid fa-right-from-bracket"></i> Sair do Painel
        </button>
    </div>
</header>






    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-10 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-1">
            <div class="bg-gray-950 border border-gray-900 rounded-2xl p-6 sticky top-24">
                <h2 class="text-xl font-bold text-white mb-1" id="form-titulo">Cadastrar Novo iPhone</h2>
                <p class="text-gray-400 text-xs mb-6">Preencha os dados para atualizar a vitrine em tempo real.</p>

                <form id="form-produto" class="space-y-4">
                    <input type="hidden" id="prod-id">

                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Modelo do iPhone</label>
                        <input type="text" id="prod-nome" placeholder="Ex: iPhone 15 Pro Max" required
                            class="w-full bg-black border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-amber-500 transition">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Capacidade</label>
                            <input type="text" id="prod-capacidade" placeholder="Ex: 128 GB" required
                                class="w-full bg-black border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-amber-500 transition">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Cor</label>
                            <input type="text" id="prod-cor" placeholder="Ex: Titânio Natural" required
                                class="w-full bg-black border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-amber-500 transition">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Preço (R$)</label>
                            <input type="number" id="prod-preco" placeholder="Ex: 6499" required min="0" step="0.01"
                                class="w-full bg-black border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-amber-500 transition">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Categoria</label>
                            <select id="prod-categoria" required
                                class="w-full bg-black border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-amber-500 transition cursor-pointer">
                                <option value="Pro">Linha Pro</option>
                                <option value="Padrao">Linha Padrão</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Status de Estoque</label>
                        <select id="prod-status" required
                            class="w-full bg-black border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-amber-500 transition cursor-pointer">
                            <option value="Disponível">Disponível</option>
                            <option value="Últimas Unidades">Últimas Unidades</option>
                            <option value="Esgotado">Esgotado</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Imagem do Aparelho</label>
                        <input type="file" id="prod-imagem" accept="image/*"
                            class="w-full bg-black border border-gray-800 rounded-xl px-3 py-2 text-xs text-gray-400 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-gray-900 file:text-amber-500 hover:file:bg-gray-800 file:cursor-pointer cursor-pointer">
                    </div>

                    <div class="pt-2 flex gap-2">
                        <button type="submit" class="flex-grow bg-amber-500 hover:bg-amber-400 text-black font-bold py-3 px-4 rounded-xl transition text-sm shadow-lg cursor-pointer">
                            Salvar Produto
                        </button>
                        <button type="button" id="btn-cancelar" onclick="resetarFormulario()" class="hidden bg-gray-950 border border-gray-800 hover:bg-gray-900 text-gray-400 hover:text-white font-medium py-3 px-4 rounded-xl transition text-sm cursor-pointer">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <section class="lg:col-span-2">
            <div class="bg-gray-950 border border-gray-900 rounded-2xl p-6">
                <h2 class="text-xl font-bold text-white mb-1">Estoque Atual</h2>
                <p class="text-gray-400 text-xs mb-6">Lista de aparelhos gerenciados no banco de dados.</p>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-900 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                <th class="pb-3 pl-2">Aparelho</th>
                                <th class="pb-3">Preço</th>
                                <th class="pb-3">Status</th>
                                <th class="pb-3 text-right pr-2">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-produtos" class="divide-y divide-gray-900/50 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <footer class="bg-gray-950 border-t border-gray-900 py-4 text-center text-xs text-gray-600 mt-10">
        <p>&copy; 2026 Jhon dos iPhones · Controle Interno Seguro</p>
    </footer>

    <script>

        // ====== TRAVA DE SEGURANÇA: COLADO BEM NO INÍCIO ======
    if (localStorage.getItem("jhon_autenticado") !== "true") {
        window.location.href = "index.html"; 
    }

// 2. FUNÇÃO DE LOGOUT (Apaga a anotação do navegador e chuta pra vitrine)
    function logout() {
        // Apaga o "jhon_autenticado = true" do bloquinho invisível
        localStorage.removeItem("jhon_autenticado"); 
        
        // Manda o Jhon de volta para o site principal
        window.location.href = "index.html"; 
    }


        // CONFIGURAÇÕES DO SEU SUPABASE (Substitua com os seus dados reais)
        const SUPABASE_URL = "https://tandvrjbckjfcfxbxnet.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhbmR2cmpiY2tqZmNmeGJ4bmV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NTExMjgsImV4cCI6MjA5NzMyNzEyOH0.K2zhdps96oj-fRnrPmOO6lePNSO-fHEGpCFsSy53B48";

// 2. MUDAMOS O NOME AQUI (de 'supabase' para 'supabaseClient')
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById("form-produto");
const tabelaCorpo = document.getElementById("tabela-produtos");

// 3. FUNÇÃO PARA CARREGAR OS PRODUTOS
async function carregarProdutos() {
    tabelaCorpo.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-gray-500">Carregando estoque...</td></tr>`;
    
    // Mudado para supabaseClient
    const { data: produtos, error } = await supabaseClient
        .from('produtos')
        .select('*')
        .order('id', { ascending: false });

    if (error) {
        console.error("Erro ao buscar:", error);
        tabelaCorpo.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-red-500">Erro ao carregar dados.</td></tr>`;
        return;
    }

    tabelaCorpo.innerHTML = "";

    if (produtos.length === 0) {
        tabelaCorpo.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-gray-500">Nenhum iPhone cadastrado.</td></tr>`;
        return;
    }

    produtos.forEach(prod => {
        let statusCor = "bg-green-500/10 text-green-400 border-green-500/20";
        if (prod.status === "Últimas Unidades") statusCor = "bg-amber-500/10 text-amber-400 border-amber-500/20";
        if (prod.status === "Esgotado") statusCor = "bg-red-500/10 text-red-400 border-red-500/20";

        const tr = document.createElement("tr");
        tr.className = "hover:bg-gray-900/20 transition";
        tr.innerHTML = `
            <td class="py-4 pl-2 flex items-center gap-3">
                <div class="w-10 h-10 bg-gray-900 rounded-lg flex items-center justify-center text-xs overflow-hidden border border-gray-800">
                    ${prod.imagem_url ? `<img src="${prod.imagem_url}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-mobile-screen-button text-gray-600"></i>`}
                </div>
                <div>
                    <span class="font-bold text-white block">${prod.nome}</span>
                    <span class="text-xs text-gray-400">${prod.capacidade} · ${prod.cor}</span>
                </div>
            </td>
            <td class="py-4 font-semibold text-white">R$ ${Number(prod.preco).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
            <td class="py-4">
                <span class="${statusCor} text-xs font-medium px-2 py-0.5 rounded-full border">${prod.status}</span>
            </td>
            <td class="py-4 text-right pr-2">
                <div class="flex justify-end gap-2">
                    <button onclick="prepararEdicao(${JSON.stringify(prod).replace(/"/g, '&quot;')})" class="p-2 text-gray-400 hover:text-amber-500 transition" title="Editar"><i class="fa-solid fa-pen-to-square"></i></button>
                    <button onclick="excluirProduto(${prod.id}, '${prod.imagem_url}')" class="p-2 text-gray-400 hover:text-red-500 transition" title="Excluir"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </td>
        `;
        tabelaCorpo.appendChild(tr);
    });
}

// 4. FUNÇÃO PARA SALVAR (CADASTRAR OU ATUALIZAR)
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const id = document.getElementById("prod-id").value;
    const nome = document.getElementById("prod-nome").value;
    const capacidade = document.getElementById("prod-capacidade").value;
    const cor = document.getElementById("prod-cor").value;
    const preco = parseFloat(document.getElementById("prod-preco").value);
    const categoria = document.getElementById("prod-categoria").value;
    const status = document.getElementById("prod-status").value;
    const arquivoImagem = document.getElementById("prod-imagem").files[0];

    let urlFinalImagem = "";

    if (arquivoImagem) {
        const nomeArquivo = `${Date.now()}_${arquivoImagem.name.replace(/\s+/g, '_')}`;
        
        // Mudado para supabaseClient
        const { data: uploadData, error: uploadError } = await supabaseClient.storage
            .from('fotos-iphones')
            .upload(nomeArquivo, arquivoImagem);

        if (uploadError) {
            alert("Erro ao fazer upload da imagem: " + uploadError.message);
            return;
        }

        // Mudado para supabaseClient
        const { data: publicUrlData } = supabaseClient.storage
            .from('fotos-iphones')
            .getPublicUrl(nomeArquivo);

        urlFinalImagem = publicUrlData.publicUrl;
    }

    const dadosProduto = { nome, capacidade, cor, preco, categoria, status };
    if (urlFinalImagem) {
        dadosProduto.imagem_url = urlFinalImagem;
    }

    if (id) {
        // Mudado para supabaseClient
        const { error } = await supabaseClient
            .from('produtos')
            .update(dadosProduto)
            .eq('id', id);

        if (error) alert("Erro ao atualizar: " + error.message);
    } else {
        if (!urlFinalImagem) dadosProduto.imagem_url = "";

        // Mudado para supabaseClient
        const { error } = await supabaseClient
            .from('produtos')
            .insert([dadosProduto]);

        if (error) alert("Erro ao cadastrar: " + error.message);
    }

    resetarFormulario();
    carregarProdutos();
});

// 5. FUNÇÃO PARA COLOCAR OS DADOS NO FORMULÁRIO PARA EDITAR
function prepararEdicao(prod) {
    document.getElementById("prod-id").value = prod.id;
    document.getElementById("prod-nome").value = prod.nome;
    document.getElementById("prod-capacidade").value = prod.capacidade;
    document.getElementById("prod-cor").value = prod.cor;
    document.getElementById("prod-preco").value = prod.preco;
    document.getElementById("prod-categoria").value = prod.categoria;
    document.getElementById("prod-status").value = prod.status;

    document.getElementById("form-titulo").innerText = "Editando " + prod.nome;
    document.getElementById("btn-cancelar").classList.remove("hidden");
}

// 6. FUNÇÃO PARA EXCLUIR PRODUTO
async function excluirProduto(id, urlImagem) {
    if (confirm("Tem certeza que deseja excluir este iPhone?")) {
        
        if (urlImagem) {
            const nomeArquivo = urlImagem.split('/').pop();
            // Mudado para supabaseClient
            await supabaseClient.storage.from('fotos-iphones').remove([nomeArquivo]);
        }

        // Mudado para supabaseClient
        const { error } = await supabaseClient
            .from('produtos')
            .delete()
            .eq('id', id);

        if (error) {
            alert("Erro ao excluir: " + error.message);
        } else {
            carregarProdutos();
        }
    }
}

function resetarFormulario() {
    form.reset();
    document.getElementById("prod-id").value = "";
    document.getElementById("form-titulo").innerText = "Cadastrar Novo iPhone";
    document.getElementById("btn-cancelar").classList.add("hidden");
}

// Inicializa a tabela
carregarProdutos();
    </script>
</body>
</html>
