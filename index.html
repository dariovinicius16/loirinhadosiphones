<!DOCTYPE html>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;

</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between">

    <header class="border-b border-gray-900 bg-gray-950/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-wider text-white">
                LOIRINHA DOS <span class="text-amber-500">iPHONES</span>
            </h1>
            <a href="https://wa.me/5585999287455" target="_blank" class="bg-green-600 hover:bg-green-500 text-white text-xs font-bold px-4 py-2 rounded-full transition flex items-center gap-2 shadow-lg shadow-green-600/20">

    <section class="max-w-6xl w-full mx-auto px-4 pt-12 pb-6 text-center">
        <div class="inline-flex items-center gap-2 bg-amber-500/10 text-amber-400 text-xs font-semibold px-4 py-1.5 rounded-full border border-amber-500/20 mb-4">
            <i class="fa-solid fa-sparkles"></i> Estoque Atualizado em Tempo Real.
        </div>
        <h2 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight max-w-2xl mx-auto leading-tight">
            Escolha o seu novo <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-amber-600">iPhone</span> com quem entende do assunto!
        </h2>
    </section>

    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-10 space-y-16">
        <section>
            <div class="flex items-center gap-3 mb-8 border-b border-gray-900 pb-3">
                <div class="w-2 h-6 bg-amber-500 rounded-full"></div>
                <h3 class="text-xl font-bold text-white">Linha Premium & Pro</h3>
            </div>
            <div id="container-pro" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section>
            <div class="flex items-center gap-3 mb-8 border-b border-gray-900 pb-3">
                <div class="w-2 h-6 bg-gray-600 rounded-full"></div>
                <h3 class="text-xl font-bold text-white">Linha Padrão & Base</h3>
            </div>
            <div id="container-padrao" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <footer class="bg-gray-950 border-t border-gray-900 py-6 text-center text-xs text-gray-500 mt-20">
        <a href="login.html" class="text-gray-700 hover:text-amber-500/40 transition block mb-2 font-medium">Controle Interno</a>

        <p>&copy; 2026 Todos os direitos reservados.</p>
    </footer>

    <script>
        const SUPABASE_URL = "https://tandvrjbckjfcfxbxnet.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhbmR2cmpiY2tqZmNmeGJ4bmV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NTExMjgsImV4cCI6MjA5NzMyNzEyOH0.K2zhdps96oj-fRnrPmOO6lePNSO-fHEGpCFsSy53B48";
        const WHATSAPP_NUMERO = "5585999287455";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const containerPro = document.getElementById("container-pro");
        const containerPadrao = document.getElementById("container-padrao");

        async function renderizarVitrine() {
            const { data: produtos } = await supabaseClient.from('produtos').select('*').order('preco', { ascending: true });

            containerPro.innerHTML = "";
            containerPadrao.innerHTML = "";

            produtos.forEach(prod => {
                const statusTag = prod.status === "Esgotado" 
                    ? `<span class="absolute top-3 right-3 bg-red-600/90 text-white text-[10px] font-bold px-2 py-1 rounded-full z-10">Esgotado</span>` : "";

                const linkWhats = `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(`Olá! Tenho interesse no ${prod.nome} (${prod.capacidade} - ${prod.cor})`)}`;

                const templateImagem = prod.imagem_url 
                    ? `<img src="${prod.imagem_url}" class="w-full h-full object-contain p-6 group-hover:scale-105 transition duration-500" alt="${prod.nome}">`
                    : `<div class="w-full h-full bg-gray-900 flex items-center justify-center text-gray-700">Sem foto</div>`;

                const cardHtml = `
                    <div class="bg-gray-950 border border-gray-900 rounded-2xl overflow-hidden group flex flex-col relative hover:border-gray-800 transition">
                        ${statusTag}
                        <div class="h-64 bg-white flex items-center justify-center border-b border-gray-900/30">
                            ${templateImagem}
                        </div>
                        <div class="p-5 flex flex-col gap-3">
                            <div>
                                <h4 class="text-lg font-bold text-white group-hover:text-amber-500 transition duration-300">${prod.nome}</h4>
                                <p class="text-xs text-gray-400 mt-1 flex items-center gap-1.5">
                                    <span class="bg-gray-900 px-2 py-0.5 rounded border border-gray-800">${prod.capacidade}</span>
                                    <span class="w-1 h-1 bg-gray-700 rounded-full"></span>
                                    <span>${prod.cor}</span>
                                </p>
                            </div>
                            <div>
                                <span class="text-xs text-gray-500 uppercase font-semibold">À vista</span>
                                <div class="text-2xl font-black text-white group-hover:text-amber-500 transition duration-300">R$ ${Number(prod.preco).toLocaleString('pt-BR')}</div>
                                <p class="text-[11px] text-gray-400 mt-1"><i class="fa-solid fa-credit-card"></i> Ou até 12x no cartão.</p>
                            </div>
                            <a href="${prod.status === 'Esgotado' ? '#' : linkWhats}" target="_blank" 
                               class="w-full ${prod.status === 'Esgotado' ? 'bg-gray-800 cursor-not-allowed' : 'bg-white hover:bg-amber-500'} text-black font-bold py-3 rounded-xl text-center text-xs transition flex items-center justify-center gap-2">
                                <i class="fa-brands fa-whatsapp text-sm"></i> Tenho Interesse
                            </a>
                        </div>
                    </div>
                `;

                if (prod.categoria === "Pro") containerPro.innerHTML += cardHtml;
                else containerPadrao.innerHTML += cardHtml;
            });
        }
        renderizarVitrine();
    </script>
</body>
</html>
